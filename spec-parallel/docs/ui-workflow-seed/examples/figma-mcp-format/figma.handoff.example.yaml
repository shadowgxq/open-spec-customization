cache_directory: mcp/<change-or-page-name>
cache_status: fetched-missing
raw_file_paths:
  - mcp/<change-or-page-name>/figma.source.json
  - mcp/<change-or-page-name>/figma.metadata.xml
  - mcp/<change-or-page-name>/figma.design-context.tsx
  - mcp/<change-or-page-name>/figma.variable-defs.json
file_key: <figma-file-key>
node_ids:
  - <figma-node-id>
fetched_tools:
  - get_metadata
  - get_design_context
  - get_variable_defs
reused_tools:
  - none
color_sensitive: yes
known_gaps:
  - <gap-type>: <short note about missing or deferred design evidence>
recommended_next_reads:
  - mcp/<change-or-page-name>/figma.variable-defs.json
  - mcp/<change-or-page-name>/figma.metadata.xml
  - mcp/<change-or-page-name>/figma.design-context.tsx
