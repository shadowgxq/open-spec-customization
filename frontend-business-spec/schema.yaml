name: frontend-business-spec
version: 1
description: >
  Frontend business workflow with business specs, Figma skill intake,
  repo analysis, technical design, task execution, verification,
  and post-user-validation findings.

language_policy:
  default_language: zh-CN
  preserve:
    - technical terms
    - identifiers
    - commands
    - paths
    - filenames
    - env vars
    - config keys
    - error messages
    - logs
    - URLs

figma_policy:
  dependency_values:
    - strong
    - weak
    - none
  fidelity_values:
    - exact
    - close
    - reference
    - none
  hard_gate_values:
    - yes
    - no
  required_skill: figma-mcp-cache
  direct_figma_mcp_access: forbidden
  instruction: |
    Figma data retrieval MUST use the figma-mcp-cache skill.
    The main agent and OpenSpec workflow MUST NOT call Figma MCP tools directly.
    figma/intake.md records skill outputs, cache paths, missing artifacts, and visual constraints.
    Do not duplicate figma-mcp-cache internal implementation details in this schema.

artifacts:
  - id: proposal
    generates: proposal.md
    template: proposal.md
    description: >
      PRD-style source of truth for scope, user scenarios, acceptance,
      and optional Figma input.
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    template: spec.md
    description: >
      Business behavior and scenario specifications.
      Specs MUST NOT include implementation details, file paths,
      component split, Figma node mapping, or API implementation details.
    requires:
      - proposal

  - id: figma-intake
    generates: figma/intake.md
    template: figma-intake.md
    description: >
      Figma skill intake contract and cache summary.
      Must use figma-mcp-cache when Figma input exists.
    requires:
      - proposal

  - id: repo-analysis
    generates: analysis/repo-analysis.md
    template: repo-analysis.md
    description: >
      Repository, route, component, styling, API, state management,
      validation command, and reusable implementation surface analysis.
    requires:
      - proposal

  - id: design
    generates: design.md
    template: design.md
    description: >
      Technical design plus implementation mapping, component split,
      Figma-to-UI mapping, repo integration mapping, file ownership,
      write-lock guidance, and verification strategy.
    requires:
      - specs
      - figma-intake
      - repo-analysis

  - id: tasks
    generates: tasks.md
    template: tasks.md
    description: >
      Single-responsibility executable checklist for apply.
      Each task must include Source, Depends On, Preconditions, Owner,
      Write Lock, Parallel, Figma, Done, and Validate.
    requires:
      - design

  - id: verification
    generates: verification.md
    template: verification.md
    description: >
      Verification plan before apply and execution log after apply.
      Covers behavior, visual, technical, and regression verification.
    requires:
      - tasks

orchestration:
  strategy: staged-parallel

  stages:
    - id: proposal
      mode: single
      artifact: proposal
      agent: proposal-writer
      purpose: >
        Create proposal.md as the PRD-style source of truth.

    - id: intake
      after:
        - proposal
      mode: parallel
      artifacts:
        - id: specs
          agent: business-spec-writer
          output: "specs/**/*.md"
          purpose: >
            Write business behavior requirements and scenarios.
            Do not include implementation details.

        - id: figma-intake
          agent: figma-intake-runner
          output: figma/intake.md
          required_skill: figma-mcp-cache
          direct_figma_mcp_access: forbidden
          purpose: >
            Use figma-mcp-cache skill to collect/cache Figma evidence
            and summarize visual constraints.

        - id: repo-analysis
          agent: repo-analysis-runner
          output: analysis/repo-analysis.md
          purpose: >
            Analyze routes, components, services, hooks, style system,
            test commands, reusable implementation surfaces, and risk files.

      join:
        next: design
        rule: all_completed
        instruction: |
          Do not create design.md until specs, figma-intake, and repo-analysis are all completed.
          If Figma is not applicable, figma-intake MUST still produce figma/intake.md with "Not applicable".
          Main agent MUST NOT call Figma MCP directly.
          Figma evidence MUST come from figma-mcp-cache.

    - id: design
      after:
        - specs
        - figma-intake
        - repo-analysis
      mode: single
      artifact: design
      agent: design-writer
      purpose: >
        Create technical design, implementation mapping, Figma-to-UI mapping,
        repo integration mapping, file ownership, write-lock guidance,
        and verification strategy.

    - id: tasks
      after:
        - design
      mode: single
      artifact: tasks
      agent: task-writer
      purpose: >
        Create executable tasks with Source, Depends On, Preconditions,
        Owner, Write Lock, Parallel, Figma, Done, and Validate.

    - id: verification
      after:
        - tasks
      mode: single
      artifact: verification
      agent: verification-writer
      purpose: >
        Create verification.md as a verification plan before apply.
        During and after apply, update it with actual results and evidence.

apply:
  requires:
    - tasks
  reads:
    - proposal.md
    - "specs/**/*.md"
    - figma/intake.md
    - analysis/repo-analysis.md
    - design.md
    - tasks.md
    - verification.md
  tracks: tasks.md
  instruction: |
    Read all required context before changing code.

    Required context:
    - proposal.md
    - specs/**/*.md
    - figma/intake.md
    - analysis/repo-analysis.md
    - design.md
    - tasks.md
    - verification.md

    Figma rules:
    - If Figma input exists, do not call Figma MCP directly.
    - Use only cache paths and retrieval status recorded in figma/intake.md.
    - If a task requires Figma: full but full cache is missing, stop and refresh figma-intake through figma-mcp-cache.
    - If Figma is not applicable, ignore Figma-related task checks.

    Task execution rules:
    - Work through tasks in dependency order.
    - Respect Depends On.
    - Independent tasks may be delegated to subagents only when:
      - Parallel is yes
      - Write Lock fields do not overlap
      - Owner fields do not conflict
      - Validate commands/checks are explicit
    - Update tasks.md as tasks complete.

    Verification rules:
    - verification.md is created as a plan before apply.
    - During and after apply, update verification.md with:
      - command results
      - screenshot or evidence paths
      - behavior verification results
      - visual verification results
      - regression verification results
      - remaining gaps

    Findings:
    - Do not create findings during normal planning.
    - For post-apply issues, use post_apply.findings.

post_apply:
  findings:
    enabled: true
    registered_artifact: false
    skill: spec-finding-backwrite
    output: "findings/<date>-<slug>.md"
    trigger:
      - user_reports_issue_after_apply
      - verification_discovers_concrete_defect
      - visual_qa_fails_after_implementation
      - acceptance_criteria_changes_after_review
    instruction: |
      Findings are not part of the normal artifact DAG.
      Create findings only after user feedback or concrete verification failure.
      The finding process must:
      1. reproduce the issue
      2. identify root cause
      3. classify the wrong or incomplete artifact
      4. apply the smallest correct fix
      5. re-verify
      6. backwrite affected artifacts
      7. archive the result in findings/<date>-<slug>.md
