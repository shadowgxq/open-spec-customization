name: figma-ui-restore
version: 1
description: Figma-driven UI restoration workflow - proposal -> (specs subagent || design subagent || figma-mcp subagent) -> figma-snapshot -> ui-contract -> implementation-map + visual-qa -> tasks -> apply, with optional finding archive
artifacts:
  - id: proposal
    generates: proposal.md
    description: UI restoration proposal defining product scope, target screen, Figma source, states, and acceptance boundaries
    template: proposal.md
    instruction: >
      Create the proposal document for a Figma-driven UI restoration change.


      The proposal is the PRD/source of truth for scope and acceptance. It MUST
      define the user goal, target UI surface, Figma source, supported states,
      and restoration boundaries before any design extraction or implementation
      tasks are generated.


      Required sections:

      - Requirement Overview

      - Target Surface and Figma Source

      - Core Functional Description

      - User Scenarios and UI States

      - Restoration Scope and Fidelity Goals

      - Functional Details

      - Boundary Conditions

      - Capabilities

      - Impact


      Capabilities listed here create the contract for `specs/<capability>/spec.md`.
      If scope, target surface, supported states, or acceptance criteria change
      during bugfix or visual QA, backwrite this file.
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: OpenSpec delta specifications for behavior and scenario changes behind the restored UI
    template: spec.md
    instruction: >
      Create OpenSpec delta files for the behavior and scenario expectations
      associated with this UI restoration.


      This is a parallel planning lane. The orchestrating agent MUST delegate
      this artifact to a dedicated specs subagent and keep its write ownership
      limited to `specs/**/*.md`.


      Create one spec file per capability listed in proposal.md. Specs define
      WHAT behavior must hold; they do not define pixel layout, component
      mapping, or executable tasks.


      Use OpenSpec delta headers:

      - ## ADDED Requirements

      - ## MODIFIED Requirements

      - ## REMOVED Requirements

      - ## RENAMED Requirements


      Each requirement MUST use `### Requirement:` and each scenario MUST use
      `#### Scenario:`. Scenarios should cover the user states named in
      proposal.md, including empty/loading/error/disabled states when relevant.


      If behavior or scenario expectations change during bugfix or visual QA,
      backwrite the affected spec file.


      The specs subagent MUST NOT write `design.md`, `figma-mcp.md`,
      `figma/snapshot.json`, `ui-contract.md`, `implementation-map.md`,
      `visual-qa.md`, or `tasks.md`.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design for restoring the target UI in the chosen frontend stack
    template: design.md
    instruction: >
      Create the technical design for implementing the restored UI.


      This is a parallel planning lane. The orchestrating agent MUST delegate
      this artifact to a dedicated design subagent and keep its write ownership
      limited to `design.md`.


      The design should be frontend-stack neutral by default, but it MUST record
      the detected or requested `clientFrameworks` and `clientLanguages` when
      known.


      Required sections:

      - Requirement Overview

      - Target Stack and Existing UI System

      - Page and Route Architecture

      - API and Data Contract Design

      - Component Design

      - Style and Token Strategy

      - Asset Strategy

      - Responsive and State Strategy

      - Decisions / Trade-offs

      - Risks and Mitigations

      - Open Questions


      Focus on implementation strategy, reuse boundaries, and technical
      decisions. Do not duplicate the pixel contract from `ui-contract.md` or
      executable checklist from `tasks.md`.


      The design subagent MUST NOT write `specs/**/*.md`, `figma-mcp.md`,
      `figma/snapshot.json`, `ui-contract.md`, `implementation-map.md`,
      `visual-qa.md`, or `tasks.md`.
    requires:
      - proposal
  - id: figma-mcp
    generates: figma-mcp.md
    description: Figma MCP extraction plan and snapshot contract
    template: figma-mcp.md
    instruction: >
      Create the Figma MCP extraction plan for the target UI.


      This is a parallel planning lane. The orchestrating agent MUST delegate
      this artifact to a dedicated Figma subagent and keep its write ownership
      limited to `figma-mcp.md`, `figma/snapshot.json`, and the raw Figma
      evidence paths declared by this artifact.


      This artifact defines how to capture the Figma source and when the
      snapshot must be refreshed. It is a capture contract, not the final
      implementation input.


      Required content:

      - MCP setup assumptions and permissions

      - Figma source URL, fileKey, nodeIds, page or component scope, and owner

      - Target viewport/device information from proposal.md

      - Required MCP tools:
        - get_metadata
        - get_design_context
        - get_variable_defs
        - use_figma compact node source
        - get_screenshot

      - Raw file output contract:
        - `mcp/<change-or-page>/figma.source.json`
        - `mcp/<change-or-page>/figma.metadata.xml`
        - `mcp/<change-or-page>/figma.design-context.tsx`
        - `mcp/<change-or-page>/figma.variable-defs.json`
        - `mcp/<change-or-page>/figma.node-source.json`
        - `mcp/<change-or-page>/figma.reference.png`
        - `mcp/<change-or-page>/figma.handoff.yaml`

      - Snapshot contract for `figma/snapshot.json`

      - Refresh triggers and blocked conditions


      `examples/figma-mcp-format/` may be used only as a sanitized field-shape
      reference. Do not copy placeholder or real project data into generated
      artifacts.


      The Figma subagent MUST NOT write `specs/**/*.md`, `design.md`,
      `ui-contract.md`, `implementation-map.md`, `visual-qa.md`, or `tasks.md`.
    requires:
      - proposal
  - id: figma-snapshot
    generates: figma/snapshot.json
    description: Frozen Figma restoration source of truth for downstream UI implementation
    template: figma-snapshot.json
    instruction: >
      Create `figma/snapshot.json` by executing the capture contract in
      `figma-mcp.md`.


      By default, the same Figma subagent that created `figma-mcp.md` MUST
      create or refresh this snapshot and record any blocked conditions.


      This file is the implementation source of truth for UI restoration.
      Downstream artifacts and apply MUST read this saved snapshot instead of
      live Figma data by default.


      Required payload:

      - sourceUrl, fileKey, nodeIds, capturedAt, tools, clientFrameworks,
      clientLanguages

      - rawFilePaths for source, metadata, designContext, variableDefs,
      nodeSource, referenceScreenshot, and handoff

      - payload.metadata

      - payload.designContext

      - payload.variableDefs

      - payload.nodeSource

      - payload.referenceScreenshot

      - knownGaps


      If reference screenshot, node source, or required design context is
      missing, mark the snapshot blocked and do not generate downstream tasks.
    requires:
      - figma-mcp
  - id: ui-contract
    generates: ui-contract.md
    description: Normalized UI restoration contract derived from the frozen Figma snapshot
    template: ui-contract.md
    instruction: >
      Create the normalized UI restoration contract from `figma/snapshot.json`.


      This artifact translates raw Figma evidence into implementation-ready
      layout, style, state, and fidelity requirements. It is the primary source
      for visual restoration tasks.


      Required sections:

      - Source Evidence

      - Target Viewports

      - Layout Contract

      - Typography Contract

      - Color and Token Contract

      - Spacing, Radius, Border, and Shadow Contract

      - Component Hierarchy

      - Interaction and State Contract

      - Asset Contract

      - Fidelity Thresholds

      - Known Gaps


      Do not invent missing Figma data. If evidence is insufficient for a UI
      requirement, record it as a known gap and block visual QA until resolved.
    requires:
      - figma-snapshot
  - id: implementation-map
    generates: implementation-map.md
    description: Mapping from Figma nodes and UI contract requirements to code files, components, styles, and assets
    template: implementation-map.md
    instruction: >
      Create the implementation map that connects `design.md` and
      `ui-contract.md` to the target codebase.


      Required sections:

      - Target Stack

      - Route / Page Mapping

      - Figma Node to Component Mapping

      - Existing Component Reuse

      - New or Modified Components

      - Style and Token Mapping

      - Asset Mapping

      - Data and State Wiring

      - File Ownership Boundaries

      - Implementation Risks


      This artifact decides where UI restoration work will happen. Tasks should
      not need to rediscover file ownership or component mapping.
    requires:
      - design
      - ui-contract
  - id: visual-qa
    generates: visual-qa.md
    description: Mandatory visual QA plan and evidence log for Figma-to-implementation comparison
    template: visual-qa.md
    instruction: >
      Create the mandatory visual QA artifact.


      Before apply, this file defines the comparison plan, required viewports,
      screenshot paths, pass/fail criteria, and known risks. During apply, it
      MUST be updated with implementation screenshots, comparison results,
      deviation notes, fixes, and final pass/fail status.


      Visual QA is a hard gate. Tasks are not complete unless visual evidence
      and comparison conclusions are recorded here.
    requires:
      - ui-contract
      - implementation-map
  - id: tasks
    generates: tasks.md
    description: Single-responsibility UI restoration implementation checklist tracked by apply
    template: tasks.md
    instruction: >
      Create the task list for implementing the restored UI.


      IMPORTANT: The apply phase parses checkbox tasks. Every task MUST use
      `- [ ] X.Y Task description`.


      The orchestrating agent MUST wait for the specs subagent, design
      subagent, and Figma subagent outputs to finish, then check them for
      conflicts before creating `tasks.md`.


      Tasks must:

      - Reference `ui-contract.md` or `implementation-map.md` for every UI
      restoration task

      - Include setup, component implementation, style/token work, asset work,
      data/state wiring, and validation tasks as applicable

      - Include explicit screenshot capture and visual comparison tasks that
      update `visual-qa.md`

      - Be ordered by dependency and scoped to a single responsibility


      Do not create implementation tasks that rely on live Figma data unless a
      refresh task is explicitly included first.
    requires:
      - specs
      - design
      - ui-contract
      - implementation-map
      - visual-qa
  - id: finding
    generates: finding.md
    description: Optional bugfix finding archive for UI restoration defects and documentation backwrite decisions
    template: finding.md
    instruction: >
      Create or update `finding.md` only when a bug, visual mismatch,
      regression, incorrect behavior, or abnormal implementation result is
      discovered after artifacts have been generated.


      Required workflow:

      1. Reproduce the issue or capture the visual mismatch

      2. Bound the affected UI surface, state, viewport, and scenario

      3. Identify the root cause

      4. Define and apply the smallest correct fix

      5. Validate behavior and visual restoration

      6. Decide which artifacts must be backwritten


      Backwrite rules:

      - Scope, target surface, supported state, or acceptance changed:
      `proposal.md`

      - Implementation path or technical decision changed: `design.md`

      - Behavior or scenario changed: `specs/<capability>/spec.md`

      - Figma source, snapshot content, or extraction rule changed:
      `figma-mcp.md` and `figma/snapshot.json`

      - UI restoration contract changed: `ui-contract.md`

      - File/component mapping changed: `implementation-map.md`

      - Visual evidence or pass/fail changed: `visual-qa.md`

      - Task breakdown or order changed: `tasks.md`
    requires:
      - tasks
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read proposal.md, design.md, specs/**/*.md, figma/snapshot.json, ui-contract.md, implementation-map.md, visual-qa.md, and tasks.md before changing code.
    If finding.md exists, read it before changing code.
    Default to figma/snapshot.json and do not re-read live Figma unless tasks.md explicitly requires a refresh or the snapshot is marked stale/blocked.
    Work through pending tasks in dependency order and mark completed tasks as you go.
    Keep changes scoped to the task and preserve unrelated user changes.
    Reuse existing project components, tokens, styles, and asset conventions unless implementation-map.md explicitly requires new ones.
    For every visual restoration task, verify against ui-contract.md and update visual-qa.md with evidence.
    Capture implementation screenshots and compare them with the Figma reference screenshot for every required viewport/state before marking visual QA tasks complete.
    If pending tasks are independent and have non-overlapping write ownership, delegate them to Codex subagents with explicit ownership, completion signals, changed-file reporting, and validation expectations.
    Subagents must not revert user changes or changes made by other subagents.
    If a bug, visual mismatch, regression, incorrect behavior, or abnormal implementation result is discovered during apply or validation, create or update finding.md and use its backwrite matrix before archive.
    Pause if you hit blockers or need clarification.
