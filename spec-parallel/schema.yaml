name: spec-parallel
version: 1
description: Custom workflow - proposal -> (specs subagent || design subagent) -> tasks -> apply, with optional post-generation finding archive
artifacts:
  - id: proposal
    generates: proposal.md
    description: PRD-style proposal document defining the change scope, user scenarios, and acceptance boundaries
    template: proposal.md
    instruction: >
      Create the proposal document that defines the product need and scope.


      Sections:

      - **Requirement Overview**: Concise summary of the problem, goal, and why
      this change is needed now.

      - **Core Functional Description**: Bullet list of user-visible
      capabilities or behavior changes. Mark breaking changes with
      **BREAKING**.

      - **User Scenarios**: Multiple realistic scenarios that cover primary,
      alternate, and failure or edge flows. Each scenario should describe actor,
      trigger, expected outcome, and acceptance signal.

      - **Functional Details**: Medium-level product and technical constraints
      that shape the solution. Include data inputs, outputs, states,
      permissions, dependencies, compatibility needs, and interaction rules.
      Avoid line-by-line implementation details; those belong in `design.md`
      and `tasks.md`.

      - **Boundary Conditions**: Explicit in-scope, out-of-scope, assumptions,
      constraints, and acceptance criteria.

      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes
        a new `specs/<name>/spec.md`. Use kebab-case names.
        - **Modified Capabilities**: List existing capabilities whose
        REQUIREMENTS are changing. Only include if spec-level behavior changes.
        Each needs a delta spec file. Check `openspec/specs/` for existing spec
        names. Leave empty if no requirement changes.

      - **Impact**: Affected code, APIs, dependencies, systems, users, or
      operational processes.


      IMPORTANT: The Capabilities section creates the contract between
      proposal and specs phases. Each capability listed here needs a
      corresponding spec file.


      Proposal is the PRD/source of truth for scope and acceptance. If scope or
      acceptance changes during bugfix or validation, backwrite this file.
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: OpenSpec delta specifications for behavior and scenario changes
    template: spec.md
    instruction: >
      Create specification files that define behavior-level requirements and
      scenarios.


      This is a parallel planning lane. The orchestrating agent MUST delegate
      this artifact to a dedicated specs subagent and keep its write ownership
      limited to `specs/**/*.md`.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal
      (`specs/<capability>/spec.md`).

      - Modified capabilities: use the existing spec folder name from
      `openspec/specs/<capability>/` when creating the delta spec at
      `specs/<capability>/spec.md`.


      Specs answer WHAT behavior changes and which scenarios prove it. They do
      not replace `design.md` or `tasks.md`:

      - Put architecture, API contracts, component design, and implementation
      decisions in `design.md`.

      - Put executable single-responsibility implementation steps in `tasks.md`.

      - In specs, reference the relevant design decision only when it is needed
      to make the requirement testable or unambiguous.


      Delta operations (use ## headers):

      - **ADDED Requirements**: New behavior or new scenario coverage

      - **MODIFIED Requirements**: Changed behavior - MUST include full updated
      content

      - **REMOVED Requirements**: Deprecated behavior - MUST include **Reason**
      and **Migration**

      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format


      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description

      - Use SHALL/MUST for normative requirements

      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format

      - Scenarios MUST use exactly 4 hashtags (`####`)

      - Every requirement MUST have at least one scenario


      MODIFIED requirements workflow:

      1. Locate the existing requirement in `openspec/specs/<capability>/spec.md`

      2. Copy the ENTIRE requirement block from `### Requirement:` through all
      scenarios

      3. Paste under `## MODIFIED Requirements` and edit it to reflect the new
      behavior

      4. Ensure the requirement header text matches the existing requirement
      name exactly, whitespace-insensitive


      If behavior or scenario expectations change during bugfix or validation,
      backwrite the affected spec.


      The specs subagent MUST NOT write `design.md`, `tasks.md`, architecture
      decisions, implementation plans, or executable task checklists.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document defining architecture, APIs, components, and implementation decisions
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the proposal
      and satisfy the specs.


      This is a parallel planning lane. The orchestrating agent MUST delegate
      this artifact to a dedicated design subagent and keep its write ownership
      limited to `design.md`.


      `design.md` is required in this workflow. For small changes, keep it
      concise and explicitly state when a section is not applicable.


      Sections:

      - **Requirement Overview**: Restate the relevant proposal goal and link it
      to the affected capabilities.

      - **Architecture Design**: Current state, target architecture, data flow,
      module boundaries, dependencies, storage, permissions, error handling, and
      compatibility constraints.

      - **API Design**: Public or internal APIs, request/response shapes,
      events, data contracts, validation rules, error codes, and compatibility
      considerations. Mark "Not applicable" if no API surface changes.

      - **Component Design**: Components, modules, services, responsibilities,
      interfaces, ownership boundaries, and state transitions.

      - **Decisions / Trade-offs**: Key technical choices with rationale and
      alternatives considered.

      - **Risks and Mitigations**: Known risks, rollout concerns, migration
      needs, and rollback or recovery strategy.

      - **Open Questions**: Outstanding decisions or unknowns. If none, write
      "None".


      Focus on implementation strategy and technical decisions, not line-by-line
      coding tasks. If implementation path or technical decisions change during
      bugfix or validation, backwrite this file.


      The design subagent MUST NOT write `specs/**/*.md`, `tasks.md`, or
      executable task checklists.
    requires:
      - proposal
  - id: tasks
    generates: tasks.md
    description: Single-responsibility implementation checklist tracked by the apply phase
    template: tasks.md
    instruction: >
      Create the task list that breaks down implementation into executable,
      single-responsibility work items.


      IMPORTANT: Follow the checkbox format exactly. The apply phase parses
      `tasks.md` to track progress. Tasks not using `- [ ]` will not be
      tracked.


      The orchestrating agent MUST wait for both the specs subagent and design
      subagent to finish, then check their outputs for conflicts before creating
      `tasks.md`.


      Guidelines:

      - Group related tasks under numbered `##` headings

      - Each task MUST be a checkbox: `- [ ] X.Y Task description`

      - Each task should have one clear owner surface, one completion signal,
      and be small enough to complete in one focused session

      - Reference the relevant proposal/design/spec source when the task depends
      on a requirement, technical decision, or scenario

      - Order tasks by dependency

      - Include validation tasks for focused tests, regression checks, and
      acceptance scenarios


      Example:

      ```
      ## 1. Data Model

      - [ ] 1.1 Add the new persisted field described in design.md
      - [ ] 1.2 Add migration and rollback coverage

      ## 2. API Behavior

      - [ ] 2.1 Implement the request validation from specs/<capability>/spec.md
      - [ ] 2.2 Add error-path tests for the boundary conditions in proposal.md
      ```


      If task breakdown or execution order proves wrong during implementation
      or bugfix, backwrite this file.
    requires:
      - specs
      - design
  - id: finding
    generates: finding.md
    description: Optional bugfix finding archive for reproduction, root cause, minimal fix, validation, and document backwrite decisions
    template: finding.md
    instruction: >
      Create or update `finding.md` only when a bug, regression, incorrect
      behavior, or abnormal implementation result is discovered after OpenSpec
      artifacts have been generated.


      This artifact is the bugfix record and document-backwrite guide. It is
      not required for ordinary feature planning. If no bugfix investigation is
      needed, leave this artifact absent.


      Required workflow when used:

      1. Reproduce the issue or record why direct reproduction is unavailable

      2. Bound the affected surface and impacted scenarios

      3. Identify the most defensible root cause

      4. Define and apply the smallest correct fix

      5. Validate the fix and decide which artifacts must be backwritten


      Documentation backwrite rules:

      - If scope or acceptance changed, update `proposal.md`

      - If implementation path or technical decision changed, update
      `design.md`

      - If behavior or scenario changed, update `specs/<capability>/spec.md`

      - If task breakdown or execution order proved wrong, update `tasks.md`

      - If none of the above changed, explicitly record "No additional artifact
      backwrite required"
    requires:
      - tasks
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read proposal.md, design.md, specs/**/*.md, and tasks.md before changing code.
    If finding.md exists, read it before changing code.
    Work through pending tasks in dependency order and mark completed tasks as you go.
    Keep changes scoped to the task and preserve unrelated user changes.
    Validate each completed task with the focused checks described in tasks.md.
    If pending tasks are independent and have non-overlapping write ownership, delegate them to Codex subagents with explicit ownership, completion signals, changed-file reporting, and validation expectations.
    Subagents must not revert user changes or changes made by other subagents.
    If a bug, regression, incorrect behavior, or abnormal implementation result is discovered during apply or validation, create or update finding.md to record reproduction, root cause, minimal fix, validation, and the artifact backwrite matrix.
    After a bugfix, use finding.md to decide whether proposal.md, design.md, specs/, or tasks.md must be updated before archive.
    Pause if you hit blockers or need clarification.
